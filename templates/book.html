<!DOCTYPE html>
<html>
<head><title>Destinations</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-dark text-white py-5">
<div class="container text-center">
    <h2 class="text-info mb-5">Where to, {{ username }}?</h2>
    <div class="row">
        {% for dest in catalog.destinations %}
        <div class="col-md-4 mb-4">
            <div class="card bg-secondary text-white border-0 shadow">
                <div class="card-body py-4">
                    <h3>{{ dest }}</h3>
                    <a href="/search/{{ username }}/{{ dest }}" class="btn btn-info mt-3 fw-bold">Select</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
