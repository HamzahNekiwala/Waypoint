<!DOCTYPE html>
<html lang="en">
<head>
    <title>Waypoint | Welcome</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
          --gold: #C9A84C; --black: #0A0A0A; --surface: #111111;
          --surface-2: #1A1A1A; --border: rgba(201,168,76,0.2); --text: #F0EDE6; --muted: #888880;
        }
        html, body { height: 100%; }
        body { font-family: 'Montserrat', sans-serif; font-weight: 300; color: var(--text); overflow: hidden; }

        .bg {
          position: fixed; inset: 0;
          background-image: url('https://images.unsplash.com/photo-1488085061387-422e29b40080?w=1600&q=80');
          background-size: cover; background-position: center;
        }
        .overlay {
          position: fixed; inset: 0;
          background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.6) 100%);
        }

        .page {
          position: relative; z-index: 2;
          height: 100vh; display: flex; flex-direction: column;
          align-items: center; justify-content: center; padding: 2rem;
        }

        .wordmark { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 12vw, 7rem); font-weight: 300; letter-spacing: 0.35em; text-transform: uppercase; animation: fadeDown 1s ease both; }
        .tagline { font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); margin-top: 0.4rem; animation: fadeDown 1s 0.15s ease both; }
        .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1.5rem auto 2.5rem; }

        .card { background: rgba(10,10,10,0.75); backdrop-filter: blur(12px); border: 1px solid var(--border); padding: 2.5rem; width: 100%; max-width: 380px; position: relative; animation: fadeUp 1s 0.3s ease both; }
        .card::before { content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

        label { display: block; font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.9rem; }
        input[type="text"] { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 0.85rem 1rem; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 300; letter-spacing: 0.1em; outline: none; transition: border-color 0.3s; margin-bottom: 1.5rem; }
        input[type="text"]:focus { border-color: var(--gold); }
        input[type="password"] { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 0.85rem 1rem; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 300; letter-spacing: 0.1em; outline: none; transition: border-color 0.3s; margin-bottom: 1.5rem; }
        input[type="password"]:focus { border-color: var(--gold); }
        input::placeholder { color: var(--muted); }
        .btn-gold { width: 100%; background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 0.85rem; font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; cursor: pointer; transition: background 0.3s, color 0.3s; }
        .btn-gold:hover { background: var(--gold); color: var(--black); }

        @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: none; } }
        @keyframes fadeUp   { from { opacity: 0; transform: translateY(16px);  } to { opacity: 1; transform: none; } }
    </style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="page">
    <div class="wordmark">Waypoint</div>
    <div class="tagline">Private Travel, Perfected</div>
    <div class="divider"></div>
    <div class="card">
        {% if error %}
        <div style="color: #ff6b6b; font-size: 0.75rem; margin-bottom: 1.5rem; padding: 0.75rem; background: rgba(255, 107, 107, 0.1); border: 1px solid rgba(255, 107, 107, 0.3);">{{ error }}</div>
        {% endif %}

        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
            <button type="button" class="tab-btn" data-tab="login" style="flex: 1; background: transparent; border: none; color: var(--gold); font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; cursor: pointer; padding-bottom: 0.75rem; border-bottom: 2px solid var(--gold);">Login</button>
            <button type="button" class="tab-btn" data-tab="signup" style="flex: 1; background: transparent; border: none; color: var(--muted); font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; cursor: pointer; padding-bottom: 0.75rem; border-bottom: 2px solid transparent;">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" action="/" method="POST" style="display: block;">
            <input type="hidden" name="action" value="login">
            <label>Username</label>
            <input type="text" name="username" placeholder="your name" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="password" required>
            <button type="submit" class="btn-gold">Login</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" action="/" method="POST" style="display: none;">
            <input type="hidden" name="action" value="signup">
            <label>Username</label>
            <input type="text" name="username" placeholder="your name" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="password (min 3 chars)" required>
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="confirm password" required>
            <button type="submit" class="btn-gold">Create Account</button>
        </form>
    </div>

    <script>
        // Tab switching
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const tabButtons = document.querySelectorAll('.tab-btn');

        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab') || 'login';

        function switchTab(tabName) {
            if (tabName === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                tabButtons[0].style.color = 'var(--gold)';
                tabButtons[0].style.borderBottom = '2px solid var(--gold)';
                tabButtons[1].style.color = 'var(--muted)';
                tabButtons[1].style.borderBottom = '2px solid transparent';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                tabButtons[0].style.color = 'var(--muted)';
                tabButtons[0].style.borderBottom = '2px solid transparent';
                tabButtons[1].style.color = 'var(--gold)';
                tabButtons[1].style.borderBottom = '2px solid var(--gold)';
            }
        }

        tabButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                switchTab(e.target.dataset.tab);
            });
        });

        switchTab(tab);
    </script>
</div>
</body>
</html>
