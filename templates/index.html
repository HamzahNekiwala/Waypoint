<!DOCTYPE html>
<html>
<head><title>Waypoint | Welcome</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-dark text-white text-center py-5">
<div class="container">
    <h1 class="display-1 fw-bold text-info">WAYPOINT</h1>
    <div class="card bg-secondary mx-auto mt-5 p-4" style="max-width: 400px; border: none;">
        <form action="/login" method="POST">
            <label class="mb-2">Enter Username to Begin</label>
            <input type="text" name="username" class="form-control text-center mb-3" placeholder="sala" required>
            <button type="submit" class="btn btn-info w-100 fw-bold">Login</button>
        </form>
    </div>
</div>
</body>
</html>
